<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="240" height="260">
  <defs>
    <linearGradient id="bodyGrad" x1="30%" y1="10%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#A8F5FF" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#4AEBFB" stop-opacity="0.55"/>
      <stop offset="80%" stop-color="#00D9E8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0077B6" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="glassInner" cx="50%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hiTop" cx="35%" cy="28%" r="25%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edgeLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFE89E" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="aiboIris" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#9FE0F5"/>
      <stop offset="40%" stop-color="#4A90C4"/>
      <stop offset="80%" stop-color="#2E5C8A"/>
      <stop offset="100%" stop-color="#1B3A5C"/>
    </radialGradient>
    <radialGradient id="focusGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FFE89E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFE89E" stop-opacity="0"/>
    </radialGradient>
    <filter id="bodyShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" />
    </filter>
    <filter id="eyeBloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" />
    </filter>
  </defs>

  <circle cx="120" cy="150" r="100" fill="url(#focusGlow)"/>
  <ellipse cx="120" cy="225" rx="68" ry="8" fill="#1A3F55" opacity="0.2" filter="url(#bodyShadow)"/>

  <g class="moodie-body">
    <path fill="url(#bodyGrad)" d="
      M 70 218 C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218 Z" />
    <path fill="url(#glassInner)" d="
      M 70 218 C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218 Z" />
    <path fill="none" stroke="url(#edgeLight)" stroke-width="2" opacity="0.85" d="
      M 70 218 C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218 Z" />
    <ellipse cx="84" cy="115" rx="28" ry="34" fill="url(#hiTop)" />
    <ellipse cx="68" cy="140" rx="7" ry="10" fill="#FFFFFF" opacity="0.7" />

    <!-- Focus: 좁은 Aibo 눈 + 눈썹 -->
    <g class="moodie-eyes">
      <!-- LEFT EYE - 좁고 집중된 형태 -->
      <ellipse cx="98" cy="155" rx="13" ry="9" fill="#0A1525"/>
      <ellipse cx="98" cy="155" rx="11" ry="7.5" fill="url(#aiboIris)" filter="url(#eyeBloom)"/>
      <!-- 좁은 동공 -->
      <ellipse cx="98" cy="155" rx="3" ry="5" fill="#050B18"/>
      <circle cx="95" cy="153" r="2" fill="#FFFFFF"/>
      <!-- 눈썹 (찡그림) -->
      <path d="M 86 138 L 110 142" stroke="#1A1A2E" stroke-width="2.5" stroke-linecap="round"/>

      <!-- RIGHT EYE -->
      <ellipse cx="142" cy="155" rx="13" ry="9" fill="#0A1525"/>
      <ellipse cx="142" cy="155" rx="11" ry="7.5" fill="url(#aiboIris)" filter="url(#eyeBloom)"/>
      <ellipse cx="142" cy="155" rx="3" ry="5" fill="#050B18"/>
      <circle cx="139" cy="153" r="2" fill="#FFFFFF"/>
      <path d="M 130 142 L 154 138" stroke="#1A1A2E" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <path d="M 113 184 Q 120 188, 127 184" stroke="#1A1A2E" stroke-width="2.5" stroke-linecap="round" fill="none"/>

    <ellipse cx="78" cy="178" rx="9" ry="5" fill="#FF9EBE" opacity="0.4"/>
    <ellipse cx="162" cy="178" rx="9" ry="5" fill="#FF9EBE" opacity="0.4"/>
  </g>

  <g class="moodie-sparkles">
    <g transform="translate(36 70)" opacity="0.85"><path d="M0 -6 L 1.5 -1.5 L 6 0 L 1.5 1.5 L 0 6 L -1.5 1.5 L -6 0 L -1.5 -1.5 Z" fill="#FFE89E"/></g>
    <g transform="translate(208 110)" opacity="0.85"><path d="M0 -6 L 1.5 -1.5 L 6 0 L 1.5 1.5 L 0 6 L -1.5 1.5 L -6 0 L -1.5 -1.5 Z" fill="#FFE89E"/></g>
    <g transform="translate(196 50)" opacity="0.8"><path d="M0 -5 L 1.2 -1.2 L 5 0 L 1.2 1.2 L 0 5 L -1.2 1.2 L -5 0 L -1.2 -1.2 Z" fill="#FFFFFF"/></g>
  </g>
</svg>

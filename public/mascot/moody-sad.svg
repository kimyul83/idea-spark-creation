<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="240" height="260">
  <defs>
    <linearGradient id="bodyGrad" x1="30%" y1="10%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#C0DAEC" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#7FA8C8" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#4A82A8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2E5C8A" stop-opacity="0.65"/>
    </linearGradient>
    <radialGradient id="glassInner" cx="50%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hiTop" cx="35%" cy="28%" r="25%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edgeLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#9FC4E0" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="aiboIris" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#7FA8C4"/>
      <stop offset="50%" stop-color="#4A6F90"/>
      <stop offset="100%" stop-color="#1B3A5C"/>
    </radialGradient>
    <filter id="bodyShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </defs>

  <ellipse cx="120" cy="225" rx="68" ry="8" fill="#1A3F55" opacity="0.2" filter="url(#bodyShadow)"/>

  <g class="moodie-body">
    <path fill="url(#bodyGrad)" d="
      M 70 218 C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218 Z" />
    <path fill="url(#glassInner)" d="
      M 70 218 C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218 Z" />
    <path fill="none" stroke="url(#edgeLight)" stroke-width="2" opacity="0.7" d="
      M 70 218 C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218 Z" />
    <ellipse cx="84" cy="115" rx="28" ry="34" fill="url(#hiTop)" />

    <!-- Sad: 반쯤 감긴 블루 눈 -->
    <g class="moodie-eyes">
      <!-- LEFT EYE - half closed -->
      <path d="M 84 158 Q 98 162, 112 158" stroke="#1A1A2E" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M 87 158 Q 98 168, 109 158 Z" fill="url(#aiboIris)" opacity="0.7"/>
      <circle cx="98" cy="161" r="2" fill="#050B18"/>
      <!-- RIGHT EYE -->
      <path d="M 128 158 Q 142 162, 156 158" stroke="#1A1A2E" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M 131 158 Q 142 168, 153 158 Z" fill="url(#aiboIris)" opacity="0.7"/>
      <circle cx="142" cy="161" r="2" fill="#050B18"/>
    </g>

    <!-- 슬픈 입 -->
    <path d="M 108 188 Q 120 178, 132 188" stroke="#1A1A2E" stroke-width="2.6" stroke-linecap="round" fill="none"/>

    <!-- 눈물 -->
    <path d="M 156 168 Q 156 175, 159 178 Q 162 175, 162 168 Q 159 165, 156 168 Z" fill="#7FE8F0" opacity="0.9"/>
    <ellipse cx="158" cy="170" rx="1.5" ry="2" fill="#FFFFFF" opacity="0.8"/>

    <ellipse cx="78" cy="180" rx="9" ry="5" fill="#C49EBE" opacity="0.4"/>
    <ellipse cx="162" cy="180" rx="9" ry="5" fill="#C49EBE" opacity="0.4"/>
  </g>

  <g class="moodie-sparkles">
    <g transform="translate(36 70)" opacity="0.5"><path d="M0 -6 L 1.5 -1.5 L 6 0 L 1.5 1.5 L 0 6 L -1.5 1.5 L -6 0 L -1.5 -1.5 Z" fill="#FFFFFF"/></g>
    <g transform="translate(208 130)" opacity="0.4"><path d="M0 -4 L 1 -1 L 4 0 L 1 1 L 0 4 L -1 1 L -4 0 L -1 -1 Z" fill="#FFFFFF"/></g>
    <g transform="translate(28 180)" opacity="0.5"><path d="M0 -4 L 1 -1 L 4 0 L 1 1 L 0 4 L -1 1 L -4 0 L -1 -1 Z" fill="#7FE8F0"/></g>
  </g>
</svg>

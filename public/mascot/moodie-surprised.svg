<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="240" height="260">
  <defs>
    <linearGradient id="bodyGrad" x1="30%" y1="10%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#7FF5FF" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#4AEBFB" stop-opacity="0.92"/>
      <stop offset="80%" stop-color="#00D9E8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0077B6" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="glassInner" cx="50%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hiTop" cx="35%" cy="28%" r="22%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="bodyShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </defs>

  <ellipse cx="120" cy="225" rx="68" ry="8" fill="#1A3F55" opacity="0.22" filter="url(#bodyShadow)"/>

  <g class="moodie-body">
    <path fill="url(#bodyGrad)" d="
      M 70 218
      C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218
      Z" />
    <path fill="url(#glassInner)" d="
      M 70 218
      C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218
      Z" />

    <ellipse cx="84" cy="115" rx="26" ry="32" fill="url(#hiTop)" />
    <ellipse cx="68" cy="140" rx="6" ry="9" fill="#FFFFFF" opacity="0.55" />

    <!-- Surprised eyes: wide open, bigger -->
    <g class="moodie-eyes">
      <!-- LEFT EYE - white circle bigger, smaller pupil -->
      <ellipse cx="98" cy="153" rx="14" ry="16" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="2"/>
      <ellipse cx="98" cy="155" rx="6" ry="7" fill="#1A1A2E"/>
      <circle cx="100" cy="152" r="2" fill="#FFFFFF"/>
      <!-- RIGHT EYE -->
      <ellipse cx="142" cy="153" rx="14" ry="16" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="2"/>
      <ellipse cx="142" cy="155" rx="6" ry="7" fill="#1A1A2E"/>
      <circle cx="144" cy="152" r="2" fill="#FFFFFF"/>
    </g>

    <!-- Surprised mouth: O shape -->
    <ellipse cx="120" cy="187" rx="6" ry="8" fill="#1A1A2E"/>
    <ellipse cx="120" cy="189" rx="4" ry="5" fill="#5A2A3A"/>

    <!-- Pink cheek blush -->
    <ellipse cx="78" cy="180" rx="9" ry="5" fill="#FF9EBE" opacity="0.6"/>
    <ellipse cx="162" cy="180" rx="9" ry="5" fill="#FF9EBE" opacity="0.6"/>
  </g>

  <!-- Burst sparkles around (surprise effect) -->
  <g class="moodie-sparkles">
    <g class="sparkle sparkle-1" transform="translate(36 60)"><path d="M0 -10 L 2 -2 L 10 0 L 2 2 L 0 10 L -2 2 L -10 0 L -2 -2 Z" fill="#FFE89E" opacity="0.95"/></g>
    <g class="sparkle sparkle-2" transform="translate(210 80)"><path d="M0 -10 L 2 -2 L 10 0 L 2 2 L 0 10 L -2 2 L -10 0 L -2 -2 Z" fill="#FFFFFF" opacity="0.95"/></g>
    <g class="sparkle sparkle-3" transform="translate(196 50)"><path d="M0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z" fill="#7FF5FF" opacity="0.9"/></g>
    <g class="sparkle sparkle-4" transform="translate(50 100)"><path d="M0 -7 L 1.7 -1.7 L 7 0 L 1.7 1.7 L 0 7 L -1.7 1.7 L -7 0 L -1.7 -1.7 Z" fill="#FFE89E" opacity="0.9"/></g>
    <g class="sparkle sparkle-5" transform="translate(200 220)"><path d="M0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z" fill="#FFFFFF" opacity="0.95"/></g>
    <g class="sparkle sparkle-6" transform="translate(28 220)"><path d="M0 -6 L 1.5 -1.5 L 6 0 L 1.5 1.5 L 0 6 L -1.5 1.5 L -6 0 L -1.5 -1.5 Z" fill="#FFE89E" opacity="0.85"/></g>
  </g>
</svg>

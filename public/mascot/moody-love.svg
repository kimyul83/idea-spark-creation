<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="240" height="260">
  <defs>
    <linearGradient id="bodyGrad" x1="30%" y1="10%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#A8F5FF" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#4AEBFB" stop-opacity="0.55"/>
      <stop offset="80%" stop-color="#00D9E8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0077B6" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="glassInner" cx="50%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hiTop" cx="35%" cy="28%" r="25%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edgeLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFB3D1" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="loveAura" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFB3D1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFB3D1" stop-opacity="0"/>
    </radialGradient>
    <filter id="bodyShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </defs>

  <circle cx="120" cy="150" r="105" fill="url(#loveAura)"/>
  <ellipse cx="120" cy="225" rx="68" ry="8" fill="#1A3F55" opacity="0.2" filter="url(#bodyShadow)"/>

  <g class="moodie-body">
    <path fill="url(#bodyGrad)" d="
      M 70 218 C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218 Z" />
    <path fill="url(#glassInner)" d="
      M 70 218 C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218 Z" />
    <path fill="none" stroke="url(#edgeLight)" stroke-width="2" opacity="0.85" d="
      M 70 218 C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218 Z" />
    <ellipse cx="84" cy="115" rx="28" ry="34" fill="url(#hiTop)" />
    <ellipse cx="68" cy="140" rx="7" ry="10" fill="#FFFFFF" opacity="0.7" />

    <!-- 하트 모양 눈 -->
    <g class="moodie-eyes">
      <path d="M 98 165 C 92 161, 84 158, 84 149 C 84 142, 92 140, 98 148 C 104 140, 112 142, 112 149 C 112 158, 104 161, 98 165 Z" fill="#FF4D88"/>
      <ellipse cx="93" cy="148" rx="2.5" ry="3.5" fill="#FFFFFF" opacity="0.85"/>
      <path d="M 142 165 C 136 161, 128 158, 128 149 C 128 142, 136 140, 142 148 C 148 140, 156 142, 156 149 C 156 158, 148 161, 142 165 Z" fill="#FF4D88"/>
      <ellipse cx="137" cy="148" rx="2.5" ry="3.5" fill="#FFFFFF" opacity="0.85"/>
    </g>

    <path d="M 112 184 Q 120 190, 128 184" stroke="#1A1A2E" stroke-width="2.5" stroke-linecap="round" fill="none"/>

    <ellipse cx="78" cy="178" rx="11" ry="6" fill="#FF7AAB" opacity="0.7"/>
    <ellipse cx="162" cy="178" rx="11" ry="6" fill="#FF7AAB" opacity="0.7"/>
  </g>

  <g class="moodie-sparkles">
    <g transform="translate(40 60)">
      <path d="M 0 8 C -4 4, -10 4, -10 -2 C -10 -8, -4 -10, 0 -4 C 4 -10, 10 -8, 10 -2 C 10 4, 4 4, 0 8 Z" fill="#FF4D88" opacity="0.85"/>
    </g>
    <g transform="translate(200 80)">
      <path d="M 0 6 C -3 3, -7 3, -7 -1 C -7 -6, -3 -7, 0 -3 C 3 -7, 7 -6, 7 -1 C 7 3, 3 3, 0 6 Z" fill="#FFB3D1" opacity="0.9"/>
    </g>
    <g transform="translate(210 200)">
      <path d="M 0 5 C -2 2, -6 2, -6 -1 C -6 -5, -2 -6, 0 -2 C 2 -6, 6 -5, 6 -1 C 6 2, 2 2, 0 5 Z" fill="#FF4D88" opacity="0.85"/>
    </g>
    <g transform="translate(28 200)">
      <path d="M 0 5 C -2 2, -6 2, -6 -1 C -6 -5, -2 -6, 0 -2 C 2 -6, 6 -5, 6 -1 C 6 2, 2 2, 0 5 Z" fill="#FFB3D1" opacity="0.9"/>
    </g>
    <g transform="translate(180 30)"><path d="M0 -5 L 1.2 -1.2 L 5 0 L 1.2 1.2 L 0 5 L -1.2 1.2 L -5 0 L -1.2 -1.2 Z" fill="#FFE89E" opacity="0.85"/></g>
  </g>
</svg>

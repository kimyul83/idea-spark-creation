<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="240" height="260">
  <defs>
    <linearGradient id="bodyGrad" x1="30%" y1="10%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#4AEBFB" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#00D9E8" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#0077B6" stop-opacity="0.90"/>
    </linearGradient>
    <radialGradient id="glassInner" cx="50%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hiTop" cx="35%" cy="28%" r="22%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Aibo iris: sapphire → cyan, slightly darker at edge -->
    <radialGradient id="aiboIris" cx="50%" cy="45%" r="60%">
      <stop offset="0%"  stop-color="#7BC4E8"/>
      <stop offset="50%" stop-color="#4A90C4"/>
      <stop offset="85%" stop-color="#2E5C8A"/>
      <stop offset="100%" stop-color="#1B3A5C"/>
    </radialGradient>
    <!-- Outer ring (deep blue) -->
    <radialGradient id="aiboRing" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="#1B3A5C"/>
      <stop offset="100%" stop-color="#0A1F35"/>
    </radialGradient>
    <!-- Soft blue glow above iris -->
    <radialGradient id="aiboGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#9FD8F2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#9FD8F2" stop-opacity="0"/>
    </radialGradient>

    <filter id="bodyShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" />
    </filter>
    <filter id="aiboBloom" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" />
    </filter>
  </defs>

  <ellipse cx="120" cy="240" rx="62" ry="7" fill="#1A3F55" opacity="0.18" filter="url(#bodyShadow)"/>

  <g class="moodie-body">
    <path fill="url(#bodyGrad)" d="
      M120 30 C 165 32, 195 68, 196 116 C 197 156, 184 192, 160 210
      C 146 220, 134 224, 120 224 C 106 224, 94 220, 80 210
      C 56 192, 43 156, 44 116 C 45 68, 75 32, 120 30 Z" />
    <path fill="url(#glassInner)" d="
      M120 30 C 165 32, 195 68, 196 116 C 197 156, 184 192, 160 210
      C 146 220, 134 224, 120 224 C 106 224, 94 220, 80 210
      C 56 192, 43 156, 44 116 C 45 68, 75 32, 120 30 Z" />
    <ellipse cx="88" cy="78" rx="32" ry="38" fill="url(#hiTop)" />

    <!-- ===== Aibo OLED-style eyes ===== -->
    <g class="moodie-eyes">
      <!-- LEFT EYE -->
      <g class="eye eye-left">
        <!-- subtle eyeshadow above -->
        <ellipse cx="98" cy="115" rx="30" ry="6" fill="#1A3F55" opacity="0.15"/>
        <!-- 1. black display frame -->
        <circle cx="98" cy="138" r="29" fill="#0A1525"/>
        <!-- 2. deep blue ring -->
        <circle cx="98" cy="138" r="27" fill="url(#aiboRing)"/>
        <!-- 3. iris -->
        <circle cx="98" cy="138" r="24" fill="url(#aiboIris)" filter="url(#aiboBloom)"/>
        <!-- iris radial lines -->
        <g stroke="#1B3A5C" stroke-width="0.6" opacity="0.55" stroke-linecap="round">
          <line x1="98" y1="116" x2="98" y2="124"/>
          <line x1="98" y1="160" x2="98" y2="152"/>
          <line x1="76" y1="138" x2="84" y2="138"/>
          <line x1="120" y1="138" x2="112" y2="138"/>
          <line x1="82" y1="122" x2="87" y2="127"/>
          <line x1="114" y1="154" x2="109" y2="149"/>
          <line x1="114" y1="122" x2="109" y2="127"/>
          <line x1="82" y1="154" x2="87" y2="149"/>
          <line x1="89" y1="118" x2="91" y2="125"/>
          <line x1="107" y1="158" x2="105" y2="151"/>
          <line x1="78" y1="129" x2="85" y2="131"/>
          <line x1="118" y1="147" x2="111" y2="145"/>
        </g>
        <!-- blue bloom overlay -->
        <circle cx="98" cy="134" r="22" fill="url(#aiboGlow)"/>
        <!-- 4. pupil -->
        <circle cx="98" cy="138" r="11" fill="#050B18"/>
        <!-- 5a. main highlight (top-left, ~30% of eye) -->
        <circle cx="89" cy="128" r="8" fill="#FFFFFF"/>
        <!-- 5b. sub highlight (bottom-right, ~10%) -->
        <circle cx="106" cy="148" r="2.6" fill="#FFFFFF"/>
        <!-- tiny extra glint -->
        <circle cx="93" cy="134" r="1.4" fill="#FFFFFF" opacity="0.85"/>
      </g>

      <!-- RIGHT EYE -->
      <g class="eye eye-right">
        <ellipse cx="142" cy="115" rx="30" ry="6" fill="#1A3F55" opacity="0.15"/>
        <circle cx="142" cy="138" r="29" fill="#0A1525"/>
        <circle cx="142" cy="138" r="27" fill="url(#aiboRing)"/>
        <circle cx="142" cy="138" r="24" fill="url(#aiboIris)" filter="url(#aiboBloom)"/>
        <g stroke="#1B3A5C" stroke-width="0.6" opacity="0.55" stroke-linecap="round">
          <line x1="142" y1="116" x2="142" y2="124"/>
          <line x1="142" y1="160" x2="142" y2="152"/>
          <line x1="120" y1="138" x2="128" y2="138"/>
          <line x1="164" y1="138" x2="156" y2="138"/>
          <line x1="126" y1="122" x2="131" y2="127"/>
          <line x1="158" y1="154" x2="153" y2="149"/>
          <line x1="158" y1="122" x2="153" y2="127"/>
          <line x1="126" y1="154" x2="131" y2="149"/>
          <line x1="133" y1="118" x2="135" y2="125"/>
          <line x1="151" y1="158" x2="149" y2="151"/>
          <line x1="122" y1="129" x2="129" y2="131"/>
          <line x1="162" y1="147" x2="155" y2="145"/>
        </g>
        <circle cx="142" cy="134" r="22" fill="url(#aiboGlow)"/>
        <circle cx="142" cy="138" r="11" fill="#050B18"/>
        <circle cx="133" cy="128" r="8" fill="#FFFFFF"/>
        <circle cx="150" cy="148" r="2.6" fill="#FFFFFF"/>
        <circle cx="137" cy="134" r="1.4" fill="#FFFFFF" opacity="0.85"/>
      </g>
    </g>

    <!-- tiny smile + blush -->
    <path d="M114 188 Q 120 194, 126 188" stroke="#D88BA0" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.85"/>
    <ellipse cx="74" cy="180" rx="8" ry="4" fill="#F4B5C4" opacity="0.45"/>
    <ellipse cx="166" cy="180" rx="8" ry="4" fill="#F4B5C4" opacity="0.45"/>
  </g>

  <!-- sparkles -->
  <g class="moodie-sparkles">
    <g class="sparkle sparkle-1" transform="translate(36 70)"><path d="M0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z" fill="#FFFFFF" opacity="0.9"/></g>
    <g class="sparkle sparkle-2" transform="translate(208 110)"><path d="M0 -6 L 1.5 -1.5 L 6 0 L 1.5 1.5 L 0 6 L -1.5 1.5 L -6 0 L -1.5 -1.5 Z" fill="#FFF6C2" opacity="0.85"/></g>
    <g class="sparkle sparkle-3" transform="translate(196 50)"><path d="M0 -5 L 1.2 -1.2 L 5 0 L 1.2 1.2 L 0 5 L -1.2 1.2 L -5 0 L -1.2 -1.2 Z" fill="#FFFFFF" opacity="0.8"/></g>
    <g class="sparkle sparkle-4" transform="translate(28 168)"><path d="M0 -5 L 1.2 -1.2 L 5 0 L 1.2 1.2 L 0 5 L -1.2 1.2 L -5 0 L -1.2 -1.2 Z" fill="#FFF6C2" opacity="0.75"/></g>
    <g class="sparkle sparkle-5" transform="translate(214 200)"><path d="M0 -7 L 1.6 -1.6 L 7 0 L 1.6 1.6 L 0 7 L -1.6 1.6 L -7 0 L -1.6 -1.6 Z" fill="#FFFFFF" opacity="0.85"/></g>
  </g>
</svg>

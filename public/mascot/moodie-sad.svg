<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="240" height="260">
  <defs>
    <linearGradient id="bodyGrad" x1="30%" y1="10%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#9DC4E8" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#6BA3C9" stop-opacity="0.85"/>
      <stop offset="80%" stop-color="#4A82A8" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#2E5C8A" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="glassInner" cx="50%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hiTop" cx="35%" cy="28%" r="22%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="bodyShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </defs>

  <ellipse cx="120" cy="225" rx="68" ry="8" fill="#1A3F55" opacity="0.22" filter="url(#bodyShadow)"/>

  <g class="moodie-body">
    <path fill="url(#bodyGrad)" d="
      M 70 218
      C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218
      Z" />
    <path fill="url(#glassInner)" d="
      M 70 218
      C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218
      Z" />

    <ellipse cx="84" cy="115" rx="26" ry="32" fill="url(#hiTop)" />

    <!-- Sad eyes: half-closed (eyelid covering top half) -->
    <g class="moodie-eyes">
      <!-- Left eye - lower lid drooped -->
      <path d="M 87 158 Q 98 168, 109 158"
            stroke="#1A1A2E" stroke-width="3" stroke-linecap="round"
            fill="none"/>
      <ellipse cx="98" cy="161" rx="9" ry="4" fill="#1A1A2E" opacity="0.7"/>
      <!-- Right eye -->
      <path d="M 131 158 Q 142 168, 153 158"
            stroke="#1A1A2E" stroke-width="3" stroke-linecap="round"
            fill="none"/>
      <ellipse cx="142" cy="161" rx="9" ry="4" fill="#1A1A2E" opacity="0.7"/>
    </g>

    <!-- Sad mouth: downward curve -->
    <path d="M 108 188 Q 120 178, 132 188"
          stroke="#1A1A2E" stroke-width="2.6" stroke-linecap="round"
          fill="none"/>

    <!-- Tear drop -->
    <path d="M 156 168 Q 156 175, 159 178 Q 162 175, 162 168 Q 159 165, 156 168 Z"
          fill="#7FE8F0" opacity="0.9"/>
    <ellipse cx="158" cy="170" rx="1.5" ry="2" fill="#FFFFFF" opacity="0.8"/>

    <!-- Subtle blush -->
    <ellipse cx="78" cy="180" rx="9" ry="5" fill="#C49EBE" opacity="0.4"/>
    <ellipse cx="162" cy="180" rx="9" ry="5" fill="#C49EBE" opacity="0.4"/>
  </g>

  <!-- Fewer, dimmer sparkles -->
  <g class="moodie-sparkles">
    <g class="sparkle sparkle-1" transform="translate(36 70)" opacity="0.5"><path d="M0 -6 L 1.5 -1.5 L 6 0 L 1.5 1.5 L 0 6 L -1.5 1.5 L -6 0 L -1.5 -1.5 Z" fill="#FFFFFF"/></g>
    <g class="sparkle sparkle-2" transform="translate(208 130)" opacity="0.4"><path d="M0 -4 L 1 -1 L 4 0 L 1 1 L 0 4 L -1 1 L -4 0 L -1 -1 Z" fill="#FFFFFF"/></g>
    <g class="sparkle sparkle-3" transform="translate(28 180)" opacity="0.5"><path d="M0 -4 L 1 -1 L 4 0 L 1 1 L 0 4 L -1 1 L -4 0 L -1 -1 Z" fill="#FFF6C2"/></g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <radialGradient id="body" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#D4F0E2" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#A8DCC2" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7FA89E" stop-opacity="0.75"/>
    </radialGradient>
    <radialGradient id="highlight" cx="35%" cy="30%" r="25%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- soft shadow -->
  <ellipse cx="120" cy="215" rx="70" ry="8" fill="#2D3436" opacity="0.08"/>

  <!-- jelly slime body: rounded blob -->
  <path filter="url(#soft)" fill="url(#body)" d="
    M120 30
    C 175 30, 210 75, 205 130
    C 200 180, 165 210, 120 210
    C 75 210, 40 180, 35 130
    C 30 75, 65 30, 120 30 Z" />

  <!-- shine highlight -->
  <ellipse cx="92" cy="78" rx="38" ry="28" fill="url(#highlight)"/>

  <!-- eyes (will be controlled by JS for blink via CSS scaleY) -->
  <g class="moodie-eyes">
    <circle cx="95" cy="125" r="7" fill="#2D3436"/>
    <circle cx="145" cy="125" r="7" fill="#2D3436"/>
  </g>

  <!-- subtle smile -->
  <path d="M108 152 Q 120 162, 132 152" stroke="#2D3436" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="240" height="260">
  <defs>
    <linearGradient id="bodyGrad" x1="30%" y1="10%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#A8F5FF" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#4AEBFB" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#00B5C8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#005A8A" stop-opacity="0.65"/>
    </linearGradient>
    <radialGradient id="glassInner" cx="50%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hiTop" cx="35%" cy="28%" r="25%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edgeLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#7FE8F0" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="auraGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7FE8F0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7FE8F0" stop-opacity="0"/>
    </radialGradient>
    <filter id="bodyShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </defs>

  <circle cx="120" cy="150" r="105" fill="url(#auraGlow)"/>
  <ellipse cx="120" cy="225" rx="68" ry="8" fill="#1A3F55" opacity="0.2" filter="url(#bodyShadow)"/>

  <g class="moodie-body">
    <path fill="url(#bodyGrad)" d="
      M 70 218 C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218 Z" />
    <path fill="url(#glassInner)" d="
      M 70 218 C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218 Z" />
    <path fill="none" stroke="url(#edgeLight)" stroke-width="2" opacity="0.75" d="
      M 70 218 C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218 Z" />
    <ellipse cx="84" cy="115" rx="28" ry="34" fill="url(#hiTop)" />

    <!-- Calm: 거의 감은 평온한 눈 -->
    <g class="moodie-eyes">
      <path d="M 84 156 Q 98 152, 112 156" stroke="#1A1A2E" stroke-width="3" stroke-linecap="round" fill="none"/>
      <path d="M 128 156 Q 142 152, 156 156" stroke="#1A1A2E" stroke-width="3" stroke-linecap="round" fill="none"/>
      <!-- 감은 눈 안에 블루 광 살짝 -->
      <ellipse cx="98" cy="155" rx="3" ry="0.8" fill="#7FE8F0" opacity="0.7"/>
      <ellipse cx="142" cy="155" rx="3" ry="0.8" fill="#7FE8F0" opacity="0.7"/>
    </g>

    <path d="M 110 182 Q 120 188, 130 182" stroke="#1A1A2E" stroke-width="2.5" stroke-linecap="round" fill="none"/>

    <ellipse cx="78" cy="175" rx="9" ry="5" fill="#FF9EBE" opacity="0.45"/>
    <ellipse cx="162" cy="175" rx="9" ry="5" fill="#FF9EBE" opacity="0.45"/>

    <text x="170" y="105" font-family="serif" font-size="14" fill="#7FE8F0" opacity="0.75">z</text>
    <text x="180" y="90" font-family="serif" font-size="11" fill="#7FE8F0" opacity="0.6">z</text>
  </g>

  <g class="moodie-sparkles">
    <g transform="translate(36 80)" opacity="0.7"><path d="M0 -6 L 1.5 -1.5 L 6 0 L 1.5 1.5 L 0 6 L -1.5 1.5 L -6 0 L -1.5 -1.5 Z" fill="#7FE8F0"/></g>
    <g transform="translate(210 130)" opacity="0.7"><path d="M0 -5 L 1.2 -1.2 L 5 0 L 1.2 1.2 L 0 5 L -1.2 1.2 L -5 0 L -1.2 -1.2 Z" fill="#FFFFFF"/></g>
    <g transform="translate(28 180)" opacity="0.7"><path d="M0 -4 L 1 -1 L 4 0 L 1 1 L 0 4 L -1 1 L -4 0 L -1 -1 Z" fill="#7FE8F0"/></g>
    <g transform="translate(214 200)" opacity="0.7"><path d="M0 -5 L 1.2 -1.2 L 5 0 L 1.2 1.2 L 0 5 L -1.2 1.2 L -5 0 L -1.2 -1.2 Z" fill="#FFFFFF"/></g>
  </g>
</svg>

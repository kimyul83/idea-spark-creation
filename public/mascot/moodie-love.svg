<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="240" height="260">
  <defs>
    <linearGradient id="bodyGrad" x1="30%" y1="10%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#7FF5FF" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#4AEBFB" stop-opacity="0.92"/>
      <stop offset="80%" stop-color="#00D9E8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0077B6" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="glassInner" cx="50%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hiTop" cx="35%" cy="28%" r="22%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="loveAura" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFB3D1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFB3D1" stop-opacity="0"/>
    </radialGradient>
    <filter id="bodyShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </defs>

  <!-- Pink love aura -->
  <circle cx="120" cy="150" r="105" fill="url(#loveAura)"/>

  <ellipse cx="120" cy="225" rx="68" ry="8" fill="#1A3F55" opacity="0.22" filter="url(#bodyShadow)"/>

  <g class="moodie-body">
    <path fill="url(#bodyGrad)" d="
      M 70 218
      C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218
      Z" />
    <path fill="url(#glassInner)" d="
      M 70 218
      C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218
      Z" />

    <ellipse cx="84" cy="115" rx="26" ry="32" fill="url(#hiTop)" />
    <ellipse cx="68" cy="140" rx="6" ry="9" fill="#FFFFFF" opacity="0.55" />

    <!-- Heart-shaped eyes -->
    <g class="moodie-eyes">
      <!-- LEFT HEART -->
      <path d="M 98 162
               C 94 158, 88 158, 88 150
               C 88 144, 94 142, 98 148
               C 102 142, 108 144, 108 150
               C 108 158, 102 158, 98 162 Z"
            fill="#FF4D88"/>
      <ellipse cx="94" cy="148" rx="2" ry="3" fill="#FFFFFF" opacity="0.8"/>
      <!-- RIGHT HEART -->
      <path d="M 142 162
               C 138 158, 132 158, 132 150
               C 132 144, 138 142, 142 148
               C 146 142, 152 144, 152 150
               C 152 158, 146 158, 142 162 Z"
            fill="#FF4D88"/>
      <ellipse cx="138" cy="148" rx="2" ry="3" fill="#FFFFFF" opacity="0.8"/>
    </g>

    <!-- Sweet tiny smile -->
    <path d="M 112 184 Q 120 190, 128 184"
          stroke="#1A1A2E" stroke-width="2.5" stroke-linecap="round"
          fill="none"/>

    <!-- Pink rosy cheek blush -->
    <ellipse cx="78" cy="178" rx="11" ry="6" fill="#FF7AAB" opacity="0.7"/>
    <ellipse cx="162" cy="178" rx="11" ry="6" fill="#FF7AAB" opacity="0.7"/>
  </g>

  <!-- Floating hearts around -->
  <g class="moodie-sparkles">
    <g transform="translate(40 60)">
      <path d="M 0 8 C -4 4, -10 4, -10 -2 C -10 -8, -4 -10, 0 -4 C 4 -10, 10 -8, 10 -2 C 10 4, 4 4, 0 8 Z"
            fill="#FF4D88" opacity="0.85"/>
    </g>
    <g transform="translate(200 80)">
      <path d="M 0 6 C -3 3, -7 3, -7 -1 C -7 -6, -3 -7, 0 -3 C 3 -7, 7 -6, 7 -1 C 7 3, 3 3, 0 6 Z"
            fill="#FFB3D1" opacity="0.9"/>
    </g>
    <g transform="translate(210 200)">
      <path d="M 0 5 C -2 2, -6 2, -6 -1 C -6 -5, -2 -6, 0 -2 C 2 -6, 6 -5, 6 -1 C 6 2, 2 2, 0 5 Z"
            fill="#FF4D88" opacity="0.85"/>
    </g>
    <g transform="translate(28 200)">
      <path d="M 0 5 C -2 2, -6 2, -6 -1 C -6 -5, -2 -6, 0 -2 C 2 -6, 6 -5, 6 -1 C 6 2, 2 2, 0 5 Z"
            fill="#FFB3D1" opacity="0.9"/>
    </g>
    <g class="sparkle" transform="translate(180 30)"><path d="M0 -5 L 1.2 -1.2 L 5 0 L 1.2 1.2 L 0 5 L -1.2 1.2 L -5 0 L -1.2 -1.2 Z" fill="#FFE89E" opacity="0.85"/></g>
  </g>
</svg>

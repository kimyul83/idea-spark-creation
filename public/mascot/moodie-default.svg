<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="240" height="260">
  <defs>
    <linearGradient id="bodyGrad" x1="30%" y1="10%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#7FF5FF" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#4AEBFB" stop-opacity="0.92"/>
      <stop offset="80%" stop-color="#00D9E8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0077B6" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="glassInner" cx="50%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hiTop" cx="35%" cy="28%" r="22%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="bodyShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="120" cy="225" rx="68" ry="8" fill="#1A3F55" opacity="0.22" filter="url(#bodyShadow)"/>

  <g class="moodie-body">
    <!-- Maple slime dome shape: wider at bottom, rounded dome top -->
    <path fill="url(#bodyGrad)" d="
      M 70 218
      C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218
      Z" />
    <path fill="url(#glassInner)" d="
      M 70 218
      C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218
      Z" />

    <!-- Top-left big highlight (glass shine) -->
    <ellipse cx="84" cy="115" rx="26" ry="32" fill="url(#hiTop)" />
    <!-- Small extra highlight -->
    <ellipse cx="68" cy="140" rx="6" ry="9" fill="#FFFFFF" opacity="0.55" />
    <!-- Bottom-right tiny shine -->
    <ellipse cx="170" cy="195" rx="8" ry="4" fill="#FFFFFF" opacity="0.4" />

    <!-- ===== Cute simple eyes ===== -->
    <g class="moodie-eyes">
      <!-- LEFT EYE -->
      <g class="eye eye-left">
        <ellipse cx="98" cy="155" rx="11" ry="13" fill="#1A1A2E"/>
        <ellipse cx="101" cy="151" rx="4.5" ry="5.5" fill="#FFFFFF"/>
        <circle cx="95" cy="159" r="1.8" fill="#FFFFFF" opacity="0.9"/>
      </g>
      <!-- RIGHT EYE -->
      <g class="eye eye-right">
        <ellipse cx="142" cy="155" rx="11" ry="13" fill="#1A1A2E"/>
        <ellipse cx="145" cy="151" rx="4.5" ry="5.5" fill="#FFFFFF"/>
        <circle cx="139" cy="159" r="1.8" fill="#FFFFFF" opacity="0.9"/>
      </g>
    </g>

    <!-- ω mouth (3 sideways) -->
    <path d="M 108 180 Q 114 188, 120 182 Q 126 188, 132 180"
          stroke="#1A1A2E" stroke-width="2.6" stroke-linecap="round"
          stroke-linejoin="round" fill="none"/>

    <!-- Cheek blush -->
    <ellipse cx="78" cy="178" rx="9" ry="5" fill="#FF9EBE" opacity="0.55"/>
    <ellipse cx="162" cy="178" rx="9" ry="5" fill="#FF9EBE" opacity="0.55"/>
  </g>

  <!-- Sparkles -->
  <g class="moodie-sparkles">
    <g class="sparkle sparkle-1" transform="translate(36 70)"><path d="M0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z" fill="#FFFFFF" opacity="0.9"/></g>
    <g class="sparkle sparkle-2" transform="translate(208 110)"><path d="M0 -6 L 1.5 -1.5 L 6 0 L 1.5 1.5 L 0 6 L -1.5 1.5 L -6 0 L -1.5 -1.5 Z" fill="#FFF6C2" opacity="0.85"/></g>
    <g class="sparkle sparkle-3" transform="translate(196 50)"><path d="M0 -5 L 1.2 -1.2 L 5 0 L 1.2 1.2 L 0 5 L -1.2 1.2 L -5 0 L -1.2 -1.2 Z" fill="#7FF5FF" opacity="0.9"/></g>
    <g class="sparkle sparkle-4" transform="translate(28 168)"><path d="M0 -5 L 1.2 -1.2 L 5 0 L 1.2 1.2 L 0 5 L -1.2 1.2 L -5 0 L -1.2 -1.2 Z" fill="#FFF6C2" opacity="0.75"/></g>
    <g class="sparkle sparkle-5" transform="translate(214 200)"><path d="M0 -7 L 1.6 -1.6 L 7 0 L 1.6 1.6 L 0 7 L -1.6 1.6 L -7 0 L -1.6 -1.6 Z" fill="#FFFFFF" opacity="0.85"/></g>
  </g>
</svg>

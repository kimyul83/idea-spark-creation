<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="240" height="260">
  <defs>
    <linearGradient id="bodyGrad" x1="30%" y1="10%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#7FF5FF" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#4AEBFB" stop-opacity="0.92"/>
      <stop offset="80%" stop-color="#00D9E8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0077B6" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="glassInner" cx="50%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hiTop" cx="35%" cy="28%" r="22%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="focusGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FFE89E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFE89E" stop-opacity="0"/>
    </radialGradient>
    <filter id="bodyShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </defs>

  <!-- Concentrating golden glow -->
  <circle cx="120" cy="150" r="100" fill="url(#focusGlow)"/>

  <ellipse cx="120" cy="225" rx="68" ry="8" fill="#1A3F55" opacity="0.22" filter="url(#bodyShadow)"/>

  <g class="moodie-body">
    <path fill="url(#bodyGrad)" d="
      M 70 218
      C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218
      Z" />
    <path fill="url(#glassInner)" d="
      M 70 218
      C 56 218, 44 208, 44 190
      C 44 130, 76 80, 120 80
      C 164 80, 196 130, 196 190
      C 196 208, 184 218, 170 218
      Z" />

    <ellipse cx="84" cy="115" rx="26" ry="32" fill="url(#hiTop)" />
    <ellipse cx="68" cy="140" rx="6" ry="9" fill="#FFFFFF" opacity="0.55" />

    <!-- Focused eyes: narrow + concentrated pupils -->
    <g class="moodie-eyes">
      <!-- LEFT EYE - narrow with sharp small pupil -->
      <ellipse cx="98" cy="155" rx="11" ry="8" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="1.5"/>
      <ellipse cx="98" cy="155" rx="4" ry="6" fill="#1A1A2E"/>
      <circle cx="100" cy="153" r="1.5" fill="#FFFFFF"/>
      <!-- Eyebrow furrow -->
      <path d="M 86 138 L 110 142" stroke="#1A1A2E" stroke-width="2.5" stroke-linecap="round"/>

      <!-- RIGHT EYE -->
      <ellipse cx="142" cy="155" rx="11" ry="8" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="1.5"/>
      <ellipse cx="142" cy="155" rx="4" ry="6" fill="#1A1A2E"/>
      <circle cx="144" cy="153" r="1.5" fill="#FFFFFF"/>
      <path d="M 130 142 L 154 138" stroke="#1A1A2E" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- Determined small mouth: straight line with slight arc -->
    <path d="M 113 184 Q 120 188, 127 184"
          stroke="#1A1A2E" stroke-width="2.5" stroke-linecap="round"
          fill="none"/>

    <!-- Subtle blush -->
    <ellipse cx="78" cy="178" rx="9" ry="5" fill="#FF9EBE" opacity="0.4"/>
    <ellipse cx="162" cy="178" rx="9" ry="5" fill="#FF9EBE" opacity="0.4"/>
  </g>

  <!-- Targeted focused sparkles, arranged near eyes -->
  <g class="moodie-sparkles">
    <g class="sparkle" transform="translate(36 70)" opacity="0.85"><path d="M0 -6 L 1.5 -1.5 L 6 0 L 1.5 1.5 L 0 6 L -1.5 1.5 L -6 0 L -1.5 -1.5 Z" fill="#FFE89E"/></g>
    <g class="sparkle" transform="translate(208 110)" opacity="0.85"><path d="M0 -6 L 1.5 -1.5 L 6 0 L 1.5 1.5 L 0 6 L -1.5 1.5 L -6 0 L -1.5 -1.5 Z" fill="#FFE89E"/></g>
    <g class="sparkle" transform="translate(196 50)" opacity="0.8"><path d="M0 -5 L 1.2 -1.2 L 5 0 L 1.2 1.2 L 0 5 L -1.2 1.2 L -5 0 L -1.2 -1.2 Z" fill="#FFFFFF"/></g>
  </g>
</svg>

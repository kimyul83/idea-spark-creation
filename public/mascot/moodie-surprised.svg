<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="240" height="260">
  <defs>
    <linearGradient id="bodyGrad" x1="30%" y1="10%" x2="70%" y2="100%"><stop offset="0%" stop-color="#4AEBFB" stop-opacity="0.95"/><stop offset="50%" stop-color="#00D9E8" stop-opacity="0.92"/><stop offset="100%" stop-color="#0077B6" stop-opacity="0.90"/></linearGradient>
    <radialGradient id="glassInner" cx="50%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hiTop" cx="35%" cy="28%" r="22%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aiboIris" cx="50%" cy="45%" r="60%">
      <stop offset="0%"  stop-color="#9FD8F2"/>
      <stop offset="50%" stop-color="#4A90C4"/>
      <stop offset="85%" stop-color="#2E5C8A"/>
      <stop offset="100%" stop-color="#1B3A5C"/>
    </radialGradient>
    <radialGradient id="aiboGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#9FD8F2" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#9FD8F2" stop-opacity="0"/>
    </radialGradient>
    <filter id="bodyShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </defs>

  <ellipse cx="120" cy="240" rx="62" ry="7" fill="#1A3F55" opacity="0.18" filter="url(#bodyShadow)"/>

  <g class="moodie-body">
    <path fill="url(#bodyGrad)" d="
      M120 30 C 165 32, 195 68, 196 116 C 197 156, 184 192, 160 210
      C 146 220, 134 224, 120 224 C 106 224, 94 220, 80 210
      C 56 192, 43 156, 44 116 C 45 68, 75 32, 120 30 Z" />
    <path fill="url(#glassInner)" d="
      M120 30 C 165 32, 195 68, 196 116 C 197 156, 184 192, 160 210
      C 146 220, 134 224, 120 224 C 106 224, 94 220, 80 210
      C 56 192, 43 156, 44 116 C 45 68, 75 32, 120 30 Z" />
    <ellipse cx="88" cy="78" rx="32" ry="38" fill="url(#hiTop)" />

    <g class="moodie-eyes">
      <!-- bigger eyes (32 vs 29), tiny pupils -->
      <g class="eye eye-left">
        <ellipse cx="98" cy="113" rx="33" ry="6" fill="#1A3F55" opacity="0.15"/>
        <circle cx="98" cy="138" r="32" fill="#0A1525"/>
        <circle cx="98" cy="138" r="30" fill="#1B3A5C"/>
        <circle cx="98" cy="138" r="27" fill="url(#aiboIris)"/>
        <circle cx="98" cy="134" r="24" fill="url(#aiboGlow)"/>
        <circle cx="98" cy="138" r="7" fill="#050B18"/>
        <circle cx="87" cy="127" r="9" fill="#FFFFFF"/>
        <circle cx="108" cy="150" r="3" fill="#FFFFFF"/>
      </g>
      <g class="eye eye-right">
        <ellipse cx="142" cy="113" rx="33" ry="6" fill="#1A3F55" opacity="0.15"/>
        <circle cx="142" cy="138" r="32" fill="#0A1525"/>
        <circle cx="142" cy="138" r="30" fill="#1B3A5C"/>
        <circle cx="142" cy="138" r="27" fill="url(#aiboIris)"/>
        <circle cx="142" cy="134" r="24" fill="url(#aiboGlow)"/>
        <circle cx="142" cy="138" r="7" fill="#050B18"/>
        <circle cx="131" cy="127" r="9" fill="#FFFFFF"/>
        <circle cx="152" cy="150" r="3" fill="#FFFFFF"/>
      </g>
    </g>

    <!-- "o" mouth -->
    <ellipse cx="120" cy="190" rx="4" ry="6" fill="#D88BA0" opacity="0.9"/>
  </g>

  <g class="moodie-sparkles">
    <g class="sparkle sparkle-1" transform="translate(36 70)"><path d="M0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z" fill="#FFFFFF" opacity="0.95"/></g>
    <g class="sparkle sparkle-2" transform="translate(208 110)"><path d="M0 -6 L 1.5 -1.5 L 6 0 L 1.5 1.5 L 0 6 L -1.5 1.5 L -6 0 L -1.5 -1.5 Z" fill="#FFF6C2" opacity="0.9"/></g>
    <g class="sparkle sparkle-3" transform="translate(196 50)"><path d="M0 -5 L 1.2 -1.2 L 5 0 L 1.2 1.2 L 0 5 L -1.2 1.2 L -5 0 L -1.2 -1.2 Z" fill="#FFFFFF" opacity="0.85"/></g>
    <g class="sparkle sparkle-4" transform="translate(28 168)"><path d="M0 -5 L 1.2 -1.2 L 5 0 L 1.2 1.2 L 0 5 L -1.2 1.2 L -5 0 L -1.2 -1.2 Z" fill="#FFF6C2" opacity="0.8"/></g>
    <g class="sparkle sparkle-5" transform="translate(214 200)"><path d="M0 -7 L 1.6 -1.6 L 7 0 L 1.6 1.6 L 0 7 L -1.6 1.6 L -7 0 L -1.6 -1.6 Z" fill="#FFFFFF" opacity="0.9"/></g>
  </g>
</svg>
